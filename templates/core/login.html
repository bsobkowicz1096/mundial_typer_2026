{% extends "base.html" %}
{% block title %}Logowanie — Mundial 2026{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10 bg-white p-8 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">Logowanie</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-green-700 text-white py-2 rounded hover:bg-green-800 font-medium">
            Zaloguj
        </button>
    </form>
    <p class="text-center text-sm mt-4 text-gray-500">
        <a href="{% url 'password_reset' %}" class="hover:underline">Zapomniałem hasła</a>
    </p>
</div>
{% endblock %}
