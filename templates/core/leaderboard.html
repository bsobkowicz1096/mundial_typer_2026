{% extends "base.html" %}
{% block title %}Tabela — Mundial 2026{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">Tabela ligi</h1>

<div class="bg-zinc-900 rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-zinc-950 border-b border-zinc-800 text-xs text-zinc-500 uppercase tracking-wide">
            <tr>
                <th class="px-4 py-3 text-center w-12">{% if has_live %}#~{% else %}#{% endif %}</th>
                <th class="px-4 py-3 text-left">Gracz</th>
                <th class="px-4 py-3 text-center">Pkt</th>
                {% if has_live %}
                <th class="px-4 py-3 text-center text-green-400" title="Hipotetyczne punkty jeśli mecze zakończą się bieżącym wynikiem">LIVE</th>
                {% endif %}
                <th class="px-4 py-3 text-center text-orange-400" title="Dokładne wyniki">3 pkt</th>
                <th class="px-4 py-3 text-center text-amber-400 hidden sm:table-cell" title="Trafione kierunki">1 pkt</th>
                <th class="px-4 py-3 text-center text-violet-400 hidden md:table-cell" title="Zakłady dodatkowe">Spec</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"
               hx-get="{% url 'core:leaderboard' %}"
               hx-trigger="every 60s"
               hx-swap="innerHTML">
            {% include "core/partials/leaderboard_table.html" %}
        </tbody>
    </table>
</div>

{% endblock %}
