<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mundial 2026 Typer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-green-700 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="{% url 'core:home' %}" class="font-bold text-lg tracking-wide">⚽ Mundial 2026</a>
        <div class="flex items-center gap-4 text-sm">
            {% if user.is_authenticated %}
                <a href="{% url 'core:match_list' %}" class="hover:underline">Mecze</a>
                <a href="{% url 'core:leaderboard' %}" class="hover:underline">Tabela</a>
                <a href="{% url 'core:special_bets' %}" class="hover:underline">Zakłady</a>
                <a href="{% url 'core:profile' user.username %}" class="hover:underline font-medium">{{ user.username }}</a>
                <form method="post" action="{% url 'core:logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="hover:underline text-green-200">Wyloguj</button>
                </form>
            {% else %}
                <a href="{% url 'core:login' %}" class="hover:underline">Zaloguj</a>
                <a href="{% url 'core:register' %}" class="bg-white text-green-700 px-3 py-1 rounded font-medium hover:bg-green-50">Rejestracja</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-6">
    {% if messages %}
        {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded
                {% if message.tags == 'success' %}bg-green-100 text-green-800
                {% elif message.tags == 'error' %}bg-red-100 text-red-800
                {% else %}bg-blue-100 text-blue-800{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script>
function betDirty(form) {
    const inputs = form.querySelectorAll('input[data-orig]');
    const btn = form.querySelector('button[type=submit]');
    if (!btn) return;
    const dirty = Array.from(inputs).some(i => i.value !== i.dataset.orig);
    if (dirty) {
        btn.className = btn.className
            .replace(/bg-\w+-\d+/g, '').replace(/hover:bg-\w+-\d+/g, '').trim();
        btn.classList.add('bg-orange-500', 'hover:bg-orange-600', 'ml-1', 'text-white', 'px-2', 'py-1', 'rounded', 'text-xs', 'whitespace-nowrap');
        btn.textContent = 'Zapisz!';
    } else {
        btn.className = 'ml-1 text-white px-2 py-1 rounded text-xs whitespace-nowrap ' + btn.dataset.classClean;
        btn.textContent = btn.dataset.labelClean;
    }
}
</script>
</body>
</html>
