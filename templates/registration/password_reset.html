{% extends "base.html" %}
{% block title %}Reset hasła — Mundial 2026{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-10 bg-white p-8 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6 text-center">Reset hasła</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-green-700 text-white py-2 rounded hover:bg-green-800 font-medium">
            Wyślij link resetujący
        </button>
    </form>
</div>
{% endblock %}
